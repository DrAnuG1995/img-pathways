name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run tests (house style, finder engine, content integrity)
        run: npm test
      # Route handlers (the /api/lead → Notion endpoint) need a server and
      # aren't supported by static export. Remove them from the Pages build only;
      # the source keeps them for the Vercel deploy.
      - name: Remove the empty dynamic route unsupported by static export
        # /checklists/[slug] has no content yet, so it produces zero static params.
        # Kept in source for when checklists are added.
        run: rm -rf "app/checklists/[slug]"
      - name: Build static site
        env:
          STATIC_EXPORT: "true"
          PAGES_BASE_PATH: /img-pathways
          NEXT_PUBLIC_BASE_PATH: /img-pathways
          NEXT_PUBLIC_SITE_URL: https://dranug1995.github.io/img-pathways
          NEXT_PUBLIC_LEAD_ENDPOINT: https://formspree.io/f/xwvjyook
        run: npm run build
      - name: Disable Jekyll (serve _next assets)
        run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
